name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/TeamSubscriptions.Functions
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: dotnet build "$PROJECT_PATH" --configuration Release

      - name: Publish
        run: dotnet publish "$PROJECT_PATH" --configuration Release --no-build --output "$PUBLISH_DIR"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || '0f441d5a-6948-438f-a66f-6b27972fb414' }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || 'b9e20f22-cdf3-4d31-9628-2e615edcddb1' }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || 'b0dfd5b3-9f3c-4fb5-ae5e-0e7f81eab970' }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME || 'apimteam-func-3dexfwdm3jz34' }}
          package: ${{ env.PUBLISH_DIR }}
# keyless storage deploy
# redeploy on fresh identity-based app

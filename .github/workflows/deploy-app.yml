name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: src/TeamSubscriptions.Functions
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: dotnet build "$PROJECT_PATH" --configuration Release

      - name: Publish
        run: dotnet publish "$PROJECT_PATH" --configuration Release --no-build --output "$PUBLISH_DIR"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

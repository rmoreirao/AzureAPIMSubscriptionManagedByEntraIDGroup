name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --location "$AZURE_LOCATION"

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            infra/main.parameters.dev.json
            prefix=${{ vars.RESOURCE_PREFIX }}
            location=${{ vars.AZURE_LOCATION }}
            publisherEmail=${{ vars.APIM_PUBLISHER_EMAIL }}
            publisherName=${{ vars.APIM_PUBLISHER_NAME }}
          failOnStdErr: false

      - name: Raise product subscription limits (post-deploy)
        shell: pwsh
        run: |
          ./infra/scripts/Set-ProductSubscriptionLimits.ps1 -ResourceGroup "${{ vars.AZURE_RESOURCE_GROUP }}" -Limit 10000

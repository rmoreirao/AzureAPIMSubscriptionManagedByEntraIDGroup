<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 4 — Compact icon cards</title>
  <style>
    :root { --blue:#0078d4; --blue-dark:#106ebe; --ink:#323130; --muted:#605e5c; --line:#e1dfdd; }
    * { box-sizing: border-box; }
    body { margin:0; padding:40px 24px; background:#faf9f8;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); }
    .stage { max-width:600px; margin:0 auto; }
    .back { display:inline-block; font-size:13px; color:var(--blue); text-decoration:none; margin-bottom:18px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:22px 24px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    h2 { font-size:18px; margin:0 0 4px; }
    .hint { font-size:13px; color:var(--muted); margin:0 0 18px; }

    .subs { margin:0 0 4px; }
    .subs-head { display:flex; align-items:baseline; justify-content:space-between; margin:0 0 10px; }
    .subs-head h3 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0; }
    .subs-count { font-size:12px; color:var(--muted); }

    /* same grid as the cw-team-subscriptions widget */
    .team-table { width:100%; border-collapse:collapse; font-size:13px; }
    .team-table th, .team-table td { text-align:left; padding:8px 10px; border-bottom:1px solid #edebe9; vertical-align:middle; }
    .team-table th { font-weight:600; color:var(--muted); border-bottom:2px solid #c8c6c4; }
    .team-table tbody tr:last-child td { border-bottom:none; }
    .pill { font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; white-space:nowrap; }
    .pill.user { color:#5c2e91; background:#f3eefb; } .pill.team { color:#0b6a0b; background:#eafaea; }

    .divider { display:flex; align-items:center; gap:12px; margin:22px 0 16px; color:var(--ink); font-size:14px; font-weight:600; }
    .divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--line); }

    /* compact selectable cards */
    .opts { display:flex; gap:10px; margin:0 0 6px; }
    .opt { flex:1; display:flex; align-items:center; gap:10px; padding:12px; cursor:pointer;
      border:1px solid var(--line); border-radius:8px; background:#fff; transition:border-color .15s, background .15s; }
    .opt:hover { border-color:var(--blue); }
    .opt.sel { border-color:var(--blue); background:#eff6fc; box-shadow:inset 0 0 0 1px var(--blue); }
    .opt .ic { font-size:20px; line-height:1; }
    .opt .t b { font-size:14px; display:block; } .opt .t small { font-size:12px; color:var(--muted); }

    /* inline accordion */
    .panel { overflow:hidden; max-height:0; opacity:0; transition:max-height .28s ease, opacity .2s ease, margin .28s ease; }
    .panel.open { max-height:260px; opacity:1; margin-top:14px; }
    label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; }
    .control { width:100%; padding:9px 11px; font-size:14px; border:1px solid #8a8886; border-radius:6px; background:#fff; }
    .control:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 1px var(--blue); }
    .field { margin-bottom:14px; }
    .btn { width:100%; padding:10px 16px; font-size:14px; font-weight:600; color:#fff; background:var(--blue);
      border:none; border-radius:6px; cursor:pointer; }
    .btn:hover { background:var(--blue-dark); }
    .status { font-size:13px; margin:12px 0 0; min-height:18px; }
    .status.ok { color:#107c10; } .status.err { color:#a4262c; }
    .note { max-width:600px; margin:18px auto 0; font-size:12px; color:var(--muted); text-align:center; }
  </style>
</head>
<body>
  <div class="stage">
    <a class="back" href="./index.html">&larr; All options</a>
    <div class="card">
      <h2>Your subscriptions</h2>
      <p class="hint">Manage your existing subscriptions, or create a new one below.</p>

      <div class="subs" id="subs"></div>

      <div class="divider">Create a new subscription</div>

      <div class="opts">
        <div class="opt sel" id="optUser" data-type="user">
          <span class="ic">👤</span>
          <span class="t"><b>Personal</b><small>Tied to your account</small></span>
        </div>
        <div class="opt" id="optTeam" data-type="team">
          <span class="ic">👥</span>
          <span class="t"><b>Team</b><small>Managed by an APIM group</small></span>
        </div>
      </div>

      <form id="form" class="panel open" autocomplete="off">
        <div class="field" id="groupField" hidden>
          <label for="group">APIM group</label>
          <select id="group" class="control"></select>
        </div>
        <div class="field">
          <label for="name">Subscription name</label>
          <input id="name" class="control" type="text" placeholder="Your new product subscription name" />
        </div>
        <button class="btn" type="submit" id="submit">Subscribe</button>
        <p class="status" id="status"></p>
      </form>
    </div>
    <p class="note">Option 4 · Compact icon cards — smaller cards that expand inline instead of swapping views.</p>
  </div>

  <script>
    const groups = [{id:"g1",name:"Payments Team"},{id:"g2",name:"Identity Platform"},{id:"g3",name:"Data & Analytics"}];
    let subscriptions = [
      { name:"Payments API – Prod", group:"", type:"user" },
      { name:"Checkout – Team A", group:"Payments Team", type:"team" },
    ];
    let type = "user";
    const $ = id => document.getElementById(id);

    function renderSubs() {
      const el = $("subs");
      const rows = subscriptions.map(s => `
        <tr>
          <td><span class="pill ${s.type}">${s.type === "user" ? "User" : "Team"}</span></td>
          <td>${s.group || "—"}</td>
          <td>${s.name}</td>
        </tr>`).join("");
      el.innerHTML = `
        <div class="subs-head"><h3>Active subscriptions</h3><span class="subs-count">${subscriptions.length} total</span></div>
        <table class="team-table">
          <thead><tr><th>Type</th><th>Group</th><th>Name</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function selectType(t) {
      type = t;
      $("optUser").classList.toggle("sel", t === "user");
      $("optTeam").classList.toggle("sel", t === "team");
      $("groupField").hidden = t !== "team";
      $("submit").textContent = t === "user" ? "Subscribe" : "Create team subscription";
      $("status").textContent = "";
    }

    $("group").innerHTML = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join("");
    $("optUser").onclick = () => selectType("user");
    $("optTeam").onclick = () => selectType("team");

    $("form").addEventListener("submit", e => {
      e.preventDefault();
      const name = $("name").value.trim();
      if (!name) { $("status").className = "status err"; $("status").textContent = "Please provide a subscription name."; return; }
      const group = type === "team" ? $("group").selectedOptions[0].textContent : "";
      subscriptions.push({ name, group, type });
      $("name").value = "";
      renderSubs();
      $("status").className = "status ok";
      $("status").textContent = "Subscription created successfully.";
    });

    renderSubs();
    selectType("user");
  </script>
</body>
</html>

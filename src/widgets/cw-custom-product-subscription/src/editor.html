<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Product Subscription – editor</title>
  <link rel="stylesheet" href="./styles/editor.scss" />
  <script type="module">
    import initialize, {onChange} from "./editor"

    initialize()

    window.onChange = onChange
  </script>
</head>
<body>
<fieldset class="form">
  <div class="form-group">
    <label class="form-label" for="title">Chooser title</label>
    <input id="title" class="form-control" type="text" oninput="onChange({title: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="userSubscriptionLabel">User subscription – label</label>
    <input id="userSubscriptionLabel" class="form-control" type="text"
           oninput="onChange({userSubscriptionLabel: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="userSubscriptionDescription">User subscription – description</label>
    <input id="userSubscriptionDescription" class="form-control" type="text"
           oninput="onChange({userSubscriptionDescription: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="teamSubscriptionLabel">Team subscription – label</label>
    <input id="teamSubscriptionLabel" class="form-control" type="text"
           oninput="onChange({teamSubscriptionLabel: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="teamSubscriptionDescription">Team subscription – description</label>
    <input id="teamSubscriptionDescription" class="form-control" type="text"
           oninput="onChange({teamSubscriptionDescription: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="userPanelTitle">User panel – title</label>
    <input id="userPanelTitle" class="form-control" type="text"
           oninput="onChange({userPanelTitle: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="teamPanelTitle">Team panel – title</label>
    <input id="teamPanelTitle" class="form-control" type="text"
           oninput="onChange({teamPanelTitle: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="functionBaseUrl">Function base URL</label>
    <input id="functionBaseUrl" class="form-control" type="text"
           oninput="onChange({functionBaseUrl: this.value})" />
  </div>

  <div class="form-group">
    <label class="form-label" for="scope">Fallback APIM scope (used only off a product page; e.g. /apis or /products/{id})</label>
    <input id="scope" class="form-control" type="text" oninput="onChange({scope: this.value})" />
  </div>
</fieldset>
</body>
</html>

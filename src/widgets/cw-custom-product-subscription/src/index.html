<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Product Subscription</title>
  <link rel="stylesheet" href="./styles/app.scss" />
  <script type="module" src="./index.ts"></script>
</head>
<body>
  <div class="cps">
    <!-- Existing subscriptions (user + group) -->
    <section id="subsSection" class="subs">
      <div class="subs-head">
        <h3 class="subs-head__title">Active subscriptions</h3>
        <span id="subsCount" class="subs-count"></span>
      </div>
      <table class="group-table">
        <thead>
          <tr>
            <th>Type</th>
            <th>Group</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody id="subsBody"></tbody>
      </table>
      <p id="subsEmpty" class="user-sub-empty" hidden>You don't have subscriptions yet.</p>
      <p id="subsStatus" class="status"></p>
    </section>

    <div class="divider">Create a new subscription</div>

    <!-- Step 1: choose a subscription type -->
    <section id="chooser" class="subscription-type">
      <h3 id="title" class="subscription-type__title"></h3>
      <div class="subscription-type__options">
        <button type="button" class="option-card" id="userSubscription">
          <span class="option-card__label" id="userSubscriptionLabel"></span>
          <span class="option-card__desc" id="userSubscriptionDescription"></span>
        </button>
        <button type="button" class="option-card" id="groupSubscription">
          <span class="option-card__label" id="groupSubscriptionLabel"></span>
          <span class="option-card__desc" id="groupSubscriptionDescription"></span>
        </button>
      </div>
    </section>

    <!-- Step 2a: user subscription panel (create form) -->
    <section id="userPanel" class="panel" hidden>
      <button type="button" class="link-back" data-back>&larr; Back</button>
      <h3 id="userPanelTitle" class="panel__title"></h3>

      <form id="userForm" class="user-form">
        <input id="userSubscriptionName" class="form-control" type="text" required
               placeholder="Your new product subscription name" />
        <button type="submit" id="userSubmit" class="btn-primary">Subscribe</button>
      </form>
      <p id="userStatus" class="status"></p>
    </section>

    <!-- Step 2b: group subscription panel -->
    <section id="groupPanel" class="panel" hidden>
      <button type="button" class="link-back" data-back>&larr; Back</button>
      <h3 id="groupPanelTitle" class="panel__title"></h3>
      <form id="groupForm" class="create-group__form">
        <div class="form-group">
          <label class="form-label" for="groupSubscriptionName">Subscription Name</label>
          <input id="groupSubscriptionName" class="form-control" type="text" required
                 placeholder="e.g. Payments API – Group A" />
        </div>

        <div class="form-group">
          <label class="form-label" for="entraIdGroup">APIM Group</label>
          <select id="entraIdGroup" class="form-control" required>
            <option value="" disabled selected>Loading your groups…</option>
          </select>
        </div>

        <button type="submit" id="groupSubmit" class="btn-primary">Create Subscription</button>
        <p id="groupStatus" class="status"></p>
      </form>
    </section>
  </div>
</body>
</html>

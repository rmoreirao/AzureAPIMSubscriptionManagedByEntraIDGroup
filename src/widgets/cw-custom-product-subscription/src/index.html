<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Product Subscription</title>
    <link rel="stylesheet" href="./styles/app.scss" />
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <div class="cps">
      <!-- Existing subscriptions (user + group) -->
      <section id="subsSection" class="subs">
        <table class="group-table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Group</th>
              <th>Name</th>
            </tr>
          </thead>
          <tbody id="subsBody"></tbody>
        </table>
        <p id="subsEmpty" class="user-sub-empty" hidden>You don't have subscriptions yet.</p>
        <p id="subsStatus" class="status"></p>
      </section>

      <div class="divider" id="createHeading">Create a new subscription</div>

      <!-- Inline create form: Type + Subscription name + submit, with a conditional APIM group row -->
      <form id="createForm" class="create-form">
        <div class="bar">
          <div class="col col--type">
            <label class="form-label" for="subType" id="typeLabel">Type</label>
            <select id="subType" class="form-control">
              <option value="user" id="typePersonalOption">👤 User</option>
              <option value="group" id="typeGroupOption">👥 Group</option>
            </select>
          </div>
          <div class="col col--name">
            <label class="form-label" for="subName" id="nameLabel">Subscription name</label>
            <input
              id="subName"
              class="form-control"
              type="text"
              required
              placeholder="Your new product subscription name"
            />
          </div>
          <button type="submit" id="createSubmit" class="btn-primary">Subscribe</button>
        </div>

        <div class="group-row" id="groupRow" hidden>
          <div class="bar">
            <div class="col col--type" aria-hidden="true"></div>
            <div class="col col--name">
              <label class="form-label" for="subGroup" id="groupFieldLabel">APIM group</label>
              <select id="subGroup" class="form-control">
                <option value="" disabled selected id="groupPlaceholderOption">Select APIM Group</option>
              </select>
            </div>
          </div>
          <div class="bar">
            <div class="col col--type" aria-hidden="true"></div>
            <div class="col col--name">
              <div class="group-disclaimer" id="groupDisclaimer" role="note">
                <span class="group-disclaimer__icon" aria-hidden="true">⚠️</span>
                <span class="group-disclaimer__text">
                  All members of this group will be able to manage this subscription.
                </span>
              </div>
            </div>
          </div>
        </div>

        <p id="createStatus" class="status"></p>
      </form>
    </div>
  </body>
</html>

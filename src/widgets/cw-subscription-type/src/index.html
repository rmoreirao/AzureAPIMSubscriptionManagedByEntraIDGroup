<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Type</title>
  <link rel="stylesheet" href="./styles/app.scss" />
  <script type="module" src="./index.ts"></script>
</head>
<body>
  <div class="subscription-type">
    <h3 id="title" class="subscription-type__title"></h3>
    <div class="subscription-type__options">
      <button type="button" class="option-card" id="userSubscription">
        <span class="option-card__label" id="userSubscriptionLabel"></span>
        <span class="option-card__desc" id="userSubscriptionDescription"></span>
      </button>
      <button type="button" class="option-card" id="teamSubscription">
        <span class="option-card__label" id="teamSubscriptionLabel"></span>
        <span class="option-card__desc" id="teamSubscriptionDescription"></span>
      </button>
    </div>
  </div>
</body>
</html>

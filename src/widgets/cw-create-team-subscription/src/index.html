<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Team Subscription</title>
  <link rel="stylesheet" href="./styles/app.scss" />
  <script type="module" src="./index.ts"></script>
</head>
<body>
  <div class="create-team">
    <h3 id="title" class="create-team__title"></h3>

    <section class="subs">
      <div class="subs-head">
        <h4 class="subs-head__title">Active subscriptions</h4>
        <span id="subsCount" class="subs-count"></span>
      </div>
      <table class="team-table">
        <thead>
          <tr>
            <th>Type</th>
            <th>Group</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody id="subsBody"></tbody>
      </table>
      <p id="subsEmpty" class="empty-state" hidden>You don't have subscriptions yet.</p>
      <p id="subsStatus" class="status"></p>
    </section>

    <div class="divider">Create a new subscription</div>

    <form id="form" class="create-team__form">
      <div class="form-group">
        <label class="form-label" for="subscriptionName">Subscription Name</label>
        <input id="subscriptionName" class="form-control" type="text" required
               placeholder="e.g. Payments API – Team A" />
      </div>

      <div class="form-group">
        <label class="form-label" for="entraIdGroup">APIM Group</label>
        <select id="entraIdGroup" class="form-control" required>
          <option value="" disabled selected>Loading your groups…</option>
        </select>
      </div>

      <button type="submit" id="submit" class="btn-primary">Create Subscription</button>
      <p id="status" class="status"></p>
    </form>
  </div>
</body>
</html>

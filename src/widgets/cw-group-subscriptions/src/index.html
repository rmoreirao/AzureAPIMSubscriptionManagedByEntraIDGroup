<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Subscriptions</title>
  <link rel="stylesheet" href="./styles/app.scss" />
  <script type="module" src="./index.ts"></script>
</head>
<body>
  <div class="group-subscriptions">
    <p id="status" class="status"></p>
    <div class="filter-toolbar">
      <div class="filter-field filter-search">
        <label for="filterSearch">Search</label>
        <input id="filterSearch" type="text" placeholder="Search by name…" autocomplete="off" />
      </div>
      <div class="filter-field">
        <label for="filterType">Type</label>
        <select id="filterType" class="filter-control">
          <option value="">All types</option>
          <option value="User">User</option>
          <option value="Group">Group</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filterProduct">Product</label>
        <select id="filterProduct" class="filter-control">
          <option value="">All products</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filterState">State</label>
        <select id="filterState" class="filter-control">
          <option value="">All states</option>
          <option value="Active" selected>Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
      <button id="filterClear" class="filter-clear" type="button">Clear filters</button>
      <span id="filterCount" class="filter-count"></span>
    </div>
    <table class="group-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Group</th>
          <th>Product</th>
          <th>State</th>
          <th>Primary key</th>
          <th>Secondary key</th>
          <th>Date created</th>
          <th class="actions-col"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <p id="emptyState" class="empty-state" hidden>You have no subscriptions yet.</p>
  </div>
</body>
</html>

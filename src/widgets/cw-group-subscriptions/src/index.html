<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Subscriptions</title>
  <link rel="stylesheet" href="./styles/app.scss" />
  <script type="module" src="./index.ts"></script>
</head>
<body>
  <div class="group-subscriptions">
    <h3 id="title" class="group-subscriptions__title"></h3>
    <p id="status" class="status"></p>
    <table class="group-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Group</th>
          <th>Product</th>
          <th>State</th>
          <th>Primary key</th>
          <th>Secondary key</th>
          <th>Date created</th>
          <th class="actions-col"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <p id="emptyState" class="empty-state" hidden>You have no subscriptions yet.</p>
  </div>
</body>
</html>
